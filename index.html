<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pendências de Projetos</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login-container" style="text-align:center; margin-top:100px;">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="senha" placeholder="Senha"><br><br>

  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <!-- LOGO -->
  <div class="logo-container">
    <img src="logo.png">
  </div>

  <!-- LISTA DE -->
  <div class="filtro">
    <select id="lista"></select>
  </div>

  <!-- PROJETOS -->
  <div id="projetos" class="grid"></div>

  <div style="text-align:center; margin-top:20px;">
    <button onclick="logout()">Sair</button>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<!-- SEU SCRIPT -->
<script src="script.js"></script


</body>
</html>
